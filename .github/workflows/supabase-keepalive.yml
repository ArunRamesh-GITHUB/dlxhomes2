name: Supabase keepalive

on:
  schedule:
    # Every 3 days at 06:00 UTC — well under Supabase's 7-day free-tier pause window.
    - cron: '0 6 */3 * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/leads?select=id&limit=1" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY")
          echo "Supabase responded with HTTP $status"
          if [ "$status" -ge 300 ]; then
            echo "::error::Supabase keepalive ping failed with status $status"
            exit 1
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
