name: Telegram daily test

on:
  schedule:
    # Every day at 08:00 UTC
    - cron: '0 8 * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send test message to Telegram
        run: |
          status=$(curl -s -o response.json -w "%{http_code}" \
            -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${TELEGRAM_CHAT_ID}\", \"text\": \"✅ Daily test: lead notifications are working ($(date -u +%Y-%m-%d))\"}")
          echo "Telegram responded with HTTP $status"
          cat response.json
          if [ "$status" -ge 300 ]; then
            echo "::error::Telegram daily test failed with status $status"
            exit 1
          fi
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
